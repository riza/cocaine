name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
            archive: tar.gz
          - target: x86_64-apple-darwin
            os: macos-latest
            archive: tar.gz
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
            cross: true
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            archive: zip
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross
        if: matrix.cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build (native)
        if: ${{ !matrix.cross }}
        run: cargo build --release --target ${{ matrix.target }}

      - name: Build (cross)
        if: matrix.cross
        run: cross build --release --target ${{ matrix.target }}

      - name: Package (unix)
        if: matrix.archive == 'tar.gz'
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../cocaine-${{ matrix.target }}.tar.gz cocaine
          cd ../../..
          shasum -a 256 cocaine-${{ matrix.target }}.tar.gz > cocaine-${{ matrix.target }}.tar.gz.sha256

      - name: Package (windows)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          Compress-Archive -Path "target/${{ matrix.target }}/release/cocaine.exe" -DestinationPath "cocaine-${{ matrix.target }}.zip"
          $hash = (Get-FileHash "cocaine-${{ matrix.target }}.zip" -Algorithm SHA256).Hash.ToLower()
          "$hash  cocaine-${{ matrix.target }}.zip" | Out-File -Encoding ascii "cocaine-${{ matrix.target }}.zip.sha256"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: cocaine-${{ matrix.target }}
          path: |
            cocaine-*.tar.gz
            cocaine-*.tar.gz.sha256
            cocaine-*.zip
            cocaine-*.zip.sha256

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            cocaine-*.tar.gz
            cocaine-*.tar.gz.sha256
            cocaine-*.zip
            cocaine-*.zip.sha256

  homebrew:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Get version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Read SHA256 sums
        id: sha
        run: |
          echo "aarch64=$(cut -d ' ' -f1 cocaine-aarch64-apple-darwin.tar.gz.sha256)" >> "$GITHUB_OUTPUT"
          echo "x86_64=$(cut -d ' ' -f1 cocaine-x86_64-apple-darwin.tar.gz.sha256)" >> "$GITHUB_OUTPUT"

      - name: Checkout homebrew-tap
        uses: actions/checkout@v4
        with:
          repository: riza/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: homebrew-tap

      - name: Update formula
        run: |
          mkdir -p homebrew-tap/Formula
          sed -e 's/@@VERSION@@/${{ steps.version.outputs.version }}/g' \
              -e 's/@@SHA_ARM@@/${{ steps.sha.outputs.aarch64 }}/g' \
              -e 's/@@SHA_X86@@/${{ steps.sha.outputs.x86_64 }}/g' \
              .github/formula.rb.tmpl > homebrew-tap/Formula/cocaine.rb

      - name: Push formula
        working-directory: homebrew-tap
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/cocaine.rb
          git commit -m "cocaine ${{ steps.version.outputs.version }}"
          git push
