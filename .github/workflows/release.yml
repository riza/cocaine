name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
            archive: tar.gz
          - target: x86_64-apple-darwin
            os: macos-latest
            archive: tar.gz
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
            cross: true
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            archive: zip
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross
        if: matrix.cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build (native)
        if: ${{ !matrix.cross }}
        run: cargo build --release --target ${{ matrix.target }}

      - name: Build (cross)
        if: matrix.cross
        run: cross build --release --target ${{ matrix.target }}

      - name: Package (unix)
        if: matrix.archive == 'tar.gz'
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../cocaine-${{ matrix.target }}.tar.gz cocaine
          cd ../../..
          shasum -a 256 cocaine-${{ matrix.target }}.tar.gz > cocaine-${{ matrix.target }}.tar.gz.sha256

      - name: Package (windows)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          Compress-Archive -Path "target/${{ matrix.target }}/release/cocaine.exe" -DestinationPath "cocaine-${{ matrix.target }}.zip"
          $hash = (Get-FileHash "cocaine-${{ matrix.target }}.zip" -Algorithm SHA256).Hash.ToLower()
          "$hash  cocaine-${{ matrix.target }}.zip" | Out-File -Encoding ascii "cocaine-${{ matrix.target }}.zip.sha256"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: cocaine-${{ matrix.target }}
          path: |
            cocaine-*.tar.gz
            cocaine-*.tar.gz.sha256
            cocaine-*.zip
            cocaine-*.zip.sha256

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            cocaine-*.tar.gz
            cocaine-*.tar.gz.sha256
            cocaine-*.zip
            cocaine-*.zip.sha256

  update-homebrew-tap:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout tap
        uses: actions/checkout@v4
        with:
          repository: riza/homebrew-tap
          ref: main
          path: homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}

      - name: Update formula
        run: |
          VERSION=${{ github.ref_name }}
          VERSION_NO_V="${VERSION#v}"
          ASSET="cocaine-aarch64-apple-darwin.tar.gz"
          ASSET_URL="https://github.com/${{ github.repository }}/releases/download/${VERSION}/${ASSET}"
          SHA_URL="${ASSET_URL}.sha256"
          SHA256=$(curl -fsSL "$SHA_URL" | awk '{print $1}')

          sed -i "s|url \".*\"|url \"${ASSET_URL}\"|" homebrew-tap/Formula/cocaine.rb
          sed -i "s|sha256 \".*\"|sha256 \"${SHA256}\"|" homebrew-tap/Formula/cocaine.rb
          sed -i "s/version \"[0-9.]*\"/version \"${VERSION_NO_V}\"/" homebrew-tap/Formula/cocaine.rb

      - name: Commit and push
        working-directory: homebrew-tap
        run: |
          git config --local user.email "actions@github.com"
          git config --local user.name "GitHub Actions"
          git add Formula/cocaine.rb
          git diff --staged --quiet || git commit -m "cocaine: update to ${{ github.ref_name }}"
          git push origin HEAD
