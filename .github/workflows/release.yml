name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      sha: ${{ steps.bump.outputs.sha }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Bump Cargo.toml version
        id: bump
        run: |
          VERSION=${{ github.ref_name }}
          VERSION_NO_V="${VERSION#v}"
          sed -i "s/^version = \"[0-9.]*\"/version = \"${VERSION_NO_V}\"/" Cargo.toml
          cargo update --workspace
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git add Cargo.toml Cargo.lock
          git diff --staged --quiet || git commit -m "chore: bump version to ${VERSION_NO_V}"
          git push origin HEAD:main
          echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

  build:
    needs: prepare
    strategy:
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
            archive: tar.gz
          - target: x86_64-apple-darwin
            os: macos-latest
            archive: tar.gz
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
            cross: true
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            archive: zip
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.sha }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross
        if: matrix.cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build (native)
        if: ${{ !matrix.cross }}
        run: cargo build --release --target ${{ matrix.target }}

      - name: Build (cross)
        if: matrix.cross
        run: cross build --release --target ${{ matrix.target }}

      - name: Package (unix)
        if: matrix.archive == 'tar.gz'
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../cocaine-${{ matrix.target }}.tar.gz cocaine
          cd ../../..
          shasum -a 256 cocaine-${{ matrix.target }}.tar.gz > cocaine-${{ matrix.target }}.tar.gz.sha256

      - name: Package (windows)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          Compress-Archive -Path "target/${{ matrix.target }}/release/cocaine.exe" -DestinationPath "cocaine-${{ matrix.target }}.zip"
          $hash = (Get-FileHash "cocaine-${{ matrix.target }}.zip" -Algorithm SHA256).Hash.ToLower()
          "$hash  cocaine-${{ matrix.target }}.zip" | Out-File -Encoding ascii "cocaine-${{ matrix.target }}.zip.sha256"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: cocaine-${{ matrix.target }}
          path: |
            cocaine-*.tar.gz
            cocaine-*.tar.gz.sha256
            cocaine-*.zip
            cocaine-*.zip.sha256

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            cocaine-*.tar.gz
            cocaine-*.tar.gz.sha256
            cocaine-*.zip
            cocaine-*.zip.sha256

  update-homebrew-tap:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout tap
        uses: actions/checkout@v4
        with:
          repository: riza/homebrew-tap
          ref: main
          path: homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}

      - name: Update formula
        run: |
          VERSION=${{ github.ref_name }}
          VERSION_NO_V="${VERSION#v}"
          BASE_URL="https://github.com/${{ github.repository }}/releases/download/${VERSION}"

          ARM_URL="${BASE_URL}/cocaine-aarch64-apple-darwin.tar.gz"
          X86_URL="${BASE_URL}/cocaine-x86_64-apple-darwin.tar.gz"

          ARM_SHA256=$(curl -fsSL "${ARM_URL}.sha256" | awk '{print $1}')
          X86_SHA256=$(curl -fsSL "${X86_URL}.sha256" | awk '{print $1}')

          FORMULA="homebrew-tap/Formula/cocaine.rb"

          {
            echo 'class Cocaine < Formula'
            echo '  desc "Keep your machine awake. Like caffeinate, but with more kick."'
            echo '  homepage "https://github.com/riza/cocaine"'
            echo "  version \"${VERSION_NO_V}\""
            echo ''
            echo '  on_macos do'
            echo '    if Hardware::CPU.arm?'
            echo "      url \"${ARM_URL}\""
            echo "      sha256 \"${ARM_SHA256}\""
            echo '    else'
            echo "      url \"${X86_URL}\""
            echo "      sha256 \"${X86_SHA256}\""
            echo '    end'
            echo '  end'
            echo ''
            echo '  def install'
            echo '    bin.install "cocaine"'
            echo '  end'
            echo ''
            echo '  test do'
            echo '    assert_match version.to_s, shell_output("#{bin}/cocaine --version")'
            echo '  end'
            echo 'end'
          } > "${FORMULA}"

      - name: Commit and push
        working-directory: homebrew-tap
        run: |
          git config --local user.email "actions@github.com"
          git config --local user.name "GitHub Actions"
          git add Formula/cocaine.rb
          git diff --staged --quiet || git commit -m "cocaine: update to ${{ github.ref_name }}"
          git push origin HEAD
