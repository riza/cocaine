name: Update Homebrew Tap

on:
  release:
    types: [released]

permissions:
  contents: read

jobs:
  update-tap:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout tap
        uses: actions/checkout@v4
        with:
          repository: riza/homebrew-tap
          path: homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}

      - name: Update formula
        run: |
          VERSION=${{ github.ref_name }}

          # Update version in formula
          sed -i "s/version \"[0-9.]*\"/version \"${VERSION#v}\"/" homebrew-tap/Formula/cocaine.rb

      - name: Commit and push
        working-directory: homebrew-tap
        run: |
          git config --local user.email "actions@github.com"
          git config --local user.name "GitHub Actions"
          git add Formula/cocaine.rb
          git diff --staged --quiet || git commit -m "cocaine: update to ${{ github.ref_name }}"
          git push
